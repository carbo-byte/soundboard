<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1, user-scalable=no">
<title>Crew Soundboard</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;700&family=JetBrains+Mono:wght@400;600&display=swap');

  :root{
    --bg:#14101A;
    --card:#1E1826;
    --card-active:#241C30;
    --text:#F5F0FA;
    --muted:#8B7FA0;
    --lime:#D4FF3D;
    --magenta:#FF3D7A;
    --cyan:#3DD9FF;
    --orange:#FF9A3D;
  }

  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}

  html,body{
    margin:0; padding:0;
    background:var(--bg);
    color:var(--text);
    font-family:'Space Grotesk', -apple-system, sans-serif;
    min-height:100vh;
  }

  .wrap{
    max-width:560px;
    margin:0 auto;
    padding:28px 16px 60px;
  }

  header{
    margin-bottom:22px;
    padding-bottom:18px;
    border-bottom:1px solid rgba(245,240,250,0.08);
  }

  .eyebrow{
    font-family:'JetBrains Mono', monospace;
    font-size:11px;
    letter-spacing:0.18em;
    text-transform:uppercase;
    color:var(--lime);
    margin:0 0 8px;
  }

  h1{
    font-size:30px;
    font-weight:700;
    margin:0;
    letter-spacing:-0.01em;
  }

  .card{
    background:var(--card);
    border-radius:14px;
    padding:16px;
    margin-bottom:12px;
    border-left:4px solid var(--tag, var(--lime));
    position:relative;
    overflow:hidden;
    transition:background 0.2s ease;
  }
  .card.playing{ background:var(--card-active); }
  .card.missing{ opacity:0.85; }

  .row-top{
    display:flex;
    justify-content:space-between;
    align-items:flex-start;
    gap:10px;
  }

  .name{
    font-size:19px;
    font-weight:700;
    margin:0 0 3px;
  }

  .song{
    color:var(--muted);
    font-size:13px;
    margin:0;
  }

  .cue-edit{
    display:flex;
    align-items:center;
    gap:5px;
    font-family:'JetBrains Mono', monospace;
    font-size:12px;
    font-weight:600;
    color:var(--tag, var(--lime));
    white-space:nowrap;
  }
  .time-input{
    width:44px;
    background:rgba(0,0,0,0.25);
    border:1px solid rgba(245,240,250,0.15);
    border-radius:6px;
    color:var(--tag, var(--lime));
    font-family:'JetBrains Mono', monospace;
    font-size:12px;
    font-weight:600;
    text-align:center;
    padding:4px 2px;
  }
  .time-input:focus{
    outline:none;
    border-color:var(--tag, var(--lime));
  }

  .controls{
    display:flex;
    align-items:center;
    gap:10px;
    margin-top:14px;
  }

  .status{
    flex:1;
    font-family:'JetBrains Mono', monospace;
    font-size:11px;
    color:var(--muted);
  }

  .file-btn{
    font-family:'JetBrains Mono', monospace;
    font-size:11px;
    text-align:center;
    padding:9px 12px;
    border-radius:9px;
    border:1px dashed rgba(245,240,250,0.3);
    color:var(--muted);
    background:transparent;
    cursor:pointer;
    white-space:nowrap;
  }
  .file-btn.loaded{
    border-style:solid;
    border-color:var(--tag, var(--lime));
    color:var(--text);
  }
  input[type=file]{ display:none; }

  .play-btn{
    width:52px;
    height:52px;
    flex-shrink:0;
    border-radius:50%;
    border:none;
    background:var(--tag, var(--lime));
    color:#14101A;
    font-size:0;
    cursor:pointer;
    display:flex;
    align-items:center;
    justify-content:center;
    opacity:0.35;
    pointer-events:none;
    transition:opacity 0.2s ease;
  }
  .play-btn.ready{ opacity:1; pointer-events:auto; }
  .play-btn svg{ width:20px; height:20px; }

  .bar{
    height:3px;
    width:100%;
    background:rgba(245,240,250,0.1);
    border-radius:3px;
    margin-top:12px;
    overflow:hidden;
  }
  .bar-fill{
    height:100%;
    width:0%;
    background:var(--tag, var(--lime));
    border-radius:3px;
  }
</style>
</head>
<body>

<div class="wrap">
  <header>
    <p class="eyebrow">Crew // Setlist</p>
    <h1>Soundboard</h1>
  </header>

  <div id="board"></div>
</div>

<script>
const tags = ['#D4FF3D','#FF3D7A','#3DD9FF','#FF9A3D'];

// "file" = nome esatto che deve avere l'mp3 dentro la cartella audio/ del repo
const tracks = [
  { name:'Paolo',     song:'Puttana la galera — Niko Pandetta',        start:'0:48', end:'1:09', file:'paolo.mp3' },
  { name:'Ascione',   song:'Montagem Tomada — MXZI',                   start:'0:06', end:'0:20', file:'ascione.mp3' },
  { name:'Antonio C', song:'A Casa Mia (remix) — Livio Cori',          start:'0:31', end:'0:55', file:'carbo.mp3' },
  { name:'Matteo',    song:'Vittoria — Geolier',                       start:'0:19', end:'0:37', file:'matteo.mp3' },
  { name:'Carmine',   song:'Beretta — De Los Cerros / La Escuela',     start:'0:17', end:'0:35', file:'carmine.mp3' },
  { name:'Aniello',   song:'Esta Noche — Sma$her',                     start:'0:00', end:'0:22', file:'aniello.mp3' },
  { name:'Christian', song:'Montagem Coma — Andromeda Elysian',        start:'0:08', end:'0:24', file:'christian.mp3' },
  { name:'Peppe',     song:'Rimango Free',                             start:'0:13', end:'0:29', file:'peppe.mp3' },
  { name:'Simone',    song:'Obsesión — Aventura',                      start:'0:22', end:'0:44', file:'simone.mp3' },
  { name:'Raffaele',  song:'Only the Horses',                          start:'0:59', end:'1:17', file:'raffaele.mp3' },
  { name:'Nico',      song:'Paris (Como Hakimi) — Morad',              start:'0:56', end:'1:11', file:'nico.mp3' },
];

function toSeconds(t){
  const parts = String(t).split(':').map(Number);
  if (parts.length === 2) return parts[0]*60 + parts[1];
  return Number(t) || 0;
}
function toMMSS(sec){
  sec = Math.max(0, Math.round(sec));
  const m = Math.floor(sec/60);
  const s = sec%60;
  return m + ':' + String(s).padStart(2,'0');
}

// --- minimal IndexedDB key/value wrapper: salva solo override locali (minutaggi
// personalizzati, o un audio caricato a mano come ripiego se il file preimpostato manca) ---
const DB_NAME = 'crew-soundboard';
let dbPromise = null;
function getDB(){
  if (dbPromise) return dbPromise;
  dbPromise = new Promise((resolve, reject) => {
    const req = indexedDB.open(DB_NAME, 1);
    req.onupgradeneeded = () => req.result.createObjectStore('kv');
    req.onsuccess = () => resolve(req.result);
    req.onerror = () => reject(req.error);
  });
  return dbPromise;
}
async function dbGet(key){
  const db = await getDB();
  return new Promise((resolve, reject) => {
    const tx = db.transaction('kv', 'readonly');
    const req = tx.objectStore('kv').get(key);
    req.onsuccess = () => resolve(req.result);
    req.onerror = () => reject(req.error);
  });
}
async function dbSet(key, value){
  const db = await getDB();
  return new Promise((resolve, reject) => {
    const tx = db.transaction('kv', 'readwrite');
    tx.objectStore('kv').put(value, key);
    tx.oncomplete = () => resolve();
    tx.onerror = () => reject(tx.error);
  });
}

const board = document.getElementById('board');
const players = [];

tracks.forEach((t, i) => {
  let startSec = toSeconds(t.start);
  let endSec = toSeconds(t.end);
  const tag = tags[i % tags.length];

  const card = document.createElement('div');
  card.className = 'card';
  card.style.setProperty('--tag', tag);

  card.innerHTML = `
    <div class="row-top">
      <div>
        <p class="name">${t.name}</p>
        <p class="song">${t.song}</p>
      </div>
      <div class="cue-edit">
        <input class="time-input" id="start-${i}" value="${t.start}">
        <span>–</span>
        <input class="time-input" id="end-${i}" value="${t.end}">
      </div>
    </div>
    <div class="controls">
      <span class="status" id="status-${i}">Caricamento…</span>
      <label class="file-btn" id="filebtn-${i}" style="display:none;">Carica audio
        <input type="file" accept="audio/*" id="file-${i}">
      </label>
      <button class="play-btn" id="play-${i}">
        <svg viewBox="0 0 24 24" fill="currentColor" id="icon-${i}"><path d="M8 5v14l11-7z"/></svg>
      </button>
    </div>
    <div class="bar"><div class="bar-fill" id="bar-${i}"></div></div>
  `;
  board.appendChild(card);

  const audio = new Audio();
  audio.preload = 'auto';
  let playing = false;
  let raf = null;

  const fileInput = card.querySelector(`#file-${i}`);
  const fileBtn = card.querySelector(`#filebtn-${i}`);
  const playBtn = card.querySelector(`#play-${i}`);
  const icon = card.querySelector(`#icon-${i}`);
  const bar = card.querySelector(`#bar-${i}`);
  const startInput = card.querySelector(`#start-${i}`);
  const endInput = card.querySelector(`#end-${i}`);
  const status = card.querySelector(`#status-${i}`);

  function markReady(label){
    status.textContent = label;
    playBtn.classList.add('ready');
    card.classList.remove('missing');
  }
  function markMissing(){
    status.textContent = 'File non trovato';
    fileBtn.style.display = 'block';
    card.classList.add('missing');
  }

  fileInput.addEventListener('change', async () => {
    const f = fileInput.files[0];
    if (!f) return;
    audio.src = URL.createObjectURL(f);
    fileBtn.classList.add('loaded');
    fileBtn.textContent = f.name.length > 18 ? f.name.slice(0,16)+'…' : f.name;
    markReady('Caricato a mano');
    playBtn.classList.add('ready');
    await dbSet(`audio-${i}`, f);
    await dbSet(`audioname-${i}`, f.name);
  });

  startInput.addEventListener('change', async () => {
    startSec = toSeconds(startInput.value);
    startInput.value = toMMSS(startSec);
    await dbSet(`start-${i}`, startInput.value);
  });
  endInput.addEventListener('change', async () => {
    endSec = toSeconds(endInput.value);
    endInput.value = toMMSS(endSec);
    await dbSet(`end-${i}`, endInput.value);
  });

  function stop(){
    playing = false;
    audio.pause();
    card.classList.remove('playing');
    icon.innerHTML = '<path d="M8 5v14l11-7z"/>';
    if (raf) cancelAnimationFrame(raf);
    bar.style.width = '0%';
  }

  function tick(){
    if (!playing) return;
    const progress = Math.min(1, Math.max(0, (audio.currentTime - startSec) / (endSec - startSec || 1)));
    bar.style.width = (progress*100) + '%';
    if (audio.currentTime >= endSec) {
      stop();
      return;
    }
    raf = requestAnimationFrame(tick);
  }

  playBtn.addEventListener('click', () => {
    players.forEach(p => { if (p !== control) p.stop(); });
    if (playing) { stop(); return; }
    audio.currentTime = startSec;
    audio.play();
    playing = true;
    card.classList.add('playing');
    icon.innerHTML = '<path d="M6 5h4v14H6zM14 5h4v14h-4z"/>';
    raf = requestAnimationFrame(tick);
  });

  const control = { stop };
  players.push(control);

  // applica eventuali minutaggi personalizzati salvati su questo dispositivo
  (async () => {
    const [savedStart, savedEnd] = await Promise.all([dbGet(`start-${i}`), dbGet(`end-${i}`)]);
    if (savedStart){ startSec = toSeconds(savedStart); startInput.value = savedStart; }
    if (savedEnd){ endSec = toSeconds(savedEnd); endInput.value = savedEnd; }
  })();

  // 1) prova a caricare il file preimpostato dalla cartella audio/
  audio.src = 'audio/' + t.file;
  audio.addEventListener('canplaythrough', () => markReady('Pronto'), { once:true });
  audio.addEventListener('error', async () => {
    // 2) se manca, controlla se c'è un audio caricato a mano su questo dispositivo in precedenza
    const savedBlob = await dbGet(`audio-${i}`);
    const savedName = await dbGet(`audioname-${i}`);
    if (savedBlob){
      audio.src = URL.createObjectURL(savedBlob);
      fileBtn.classList.add('loaded');
      fileBtn.textContent = savedName || 'Audio caricato';
      markReady('Caricato a mano');
      playBtn.classList.add('ready');
    } else {
      markMissing();
    }
  }, { once:true });
  audio.load();
});
</script>

</body>
</html>
